<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Palavra-Passe - AulaBot</title>
    <link rel="stylesheet" href="criarconta.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-reset {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .reset-header h1 {
            color: #333;
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        
        .reset-header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .password-strength {
            margin-top: 8px;
            padding: 8px;
            border-radius: 3px;
            font-size: 12px;
            display: none;
        }
        
        .password-strength.weak {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .password-strength.medium {
            background-color: #fff3cd;
            color: #856404;
            display: block;
        }
        
        .password-strength.strong {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        
        .btn-reset {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-reset:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .btn-reset:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-reset:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container-reset">
        <div class="reset-header">
            <h1>Redefinir Palavra-Passe</h1>
            <p>Escolha uma nova palavra-passe</p>
        </div>
        
        <form id="resetForm" style="display: none;">
            <div class="form-group">
                <label for="nova_password">Nova Palavra-Passe:</label>
                <input type="password" id="nova_password" name="nova_password" required placeholder="Mínimo 6 caracteres">
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmar_password">Confirmar Palavra-Passe:</label>
                <input type="password" id="confirmar_password" name="confirmar_password" required placeholder="Confirme a palavra-passe">
            </div>
            
            <button type="submit" class="btn-reset">Redefinir Palavra-Passe</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div> Processando...
            </div>
            
            <div class="message" id="message"></div>
        </form>
        
        <div class="message error" id="errorMessage" style="display: none;"></div>
        
        <div class="links" id="linksDiv" style="display: none;">
            <a href="../index.php">Voltar ao Login</a>
        </div>
    </div>
    
    <script>
        function checkPasswordStrength(password) {
            let strength = 'weak';
            let message = 'Fraca';
            
            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'strong';
                    message = 'Forte';
                } else {
                    strength = 'medium';
                    message = 'Média';
                }
            } else if (password.length >= 6) {
                strength = 'medium';
                message = 'Média';
            }
            
            return { strength, message };
        }
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const errorDiv = document.getElementById('errorMessage');
        const form = document.getElementById('resetForm');
        const linksDiv = document.getElementById('linksDiv');
        
        if (!token) {
            errorDiv.textContent = 'Token de recuperação inválido ou ausente. O link pode ter expirado.';
            errorDiv.style.display = 'block';
            linksDiv.style.display = 'block';
        } else {
            form.style.display = 'block';
            form.dataset.token = token;
            
            document.getElementById('nova_password').addEventListener('input', (e) => {
                const strengthDiv = document.getElementById('passwordStrength');
                if (e.target.value.length >= 6) {
                    const { strength, message } = checkPasswordStrength(e.target.value);
                    strengthDiv.className = 'password-strength ' + strength;
                    strengthDiv.textContent = 'Força: ' + message;
                } else {
                    strengthDiv.className = 'password-strength weak';
                    strengthDiv.textContent = 'Mínimo 6 caracteres';
                }
            });
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const nova_password = document.getElementById('nova_password').value;
            const confirmar_password = document.getElementById('confirmar_password').value;
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            const button = document.querySelector('.btn-reset');
            
            if (nova_password.length < 6) {
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'A palavra-passe deve ter mínimo 6 caracteres';
                message.style.display = 'block';
                return;
            }
            
            if (nova_password !== confirmar_password) {
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'As palavras-passe não coincidem';
                message.style.display = 'block';
                return;
            }
            
            loading.style.display = 'block';
            button.disabled = true;
            
            try {
                const response = await fetch('reset_password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `token=${encodeURIComponent(token)}&nova_password=${encodeURIComponent(nova_password)}`
                });
                
                const data = await response.json();
                
                loading.style.display = 'none';
                button.disabled = false;
                
                message.classList.remove('error');
                
                if (data.sucesso) {
                    message.classList.add('success');
                    message.textContent = data.mensagem;
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '../index.php';
                    }, 2000);
                } else {
                    message.classList.add('error');
                    message.textContent = data.erro || 'Erro ao redefinir palavra-passe';
                }
                
                message.style.display = 'block';
            } catch (error) {
                loading.style.display = 'none';
                button.disabled = false;
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'Erro de conexão. Tente novamente.';
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
