<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alterar Palavra-Passe - AulaBot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-strength {
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            display: none;
        }

        .password-strength.weak {
            background-color: #ffebee;
            color: #c62828;
            display: block;
        }

        .password-strength.medium {
            background-color: #fff3e0;
            color: #e65100;
            display: block;
        }

        .password-strength.strong {
            background-color: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .toggle-password {
            position: relative;
        }

        .toggle-password input {
            padding-right: 40px;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .toggle-btn:hover {
            color: #764ba2;
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
            display: block;
        }

        .message.error {
            background-color: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
            display: block;
        }

        .message.info {
            background-color: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 15px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px 14px;
            margin: 20px 0;
            border-radius: 4px;
            font-size: 13px;
            color: #1565c0;
            line-height: 1.5;
        }

        .links {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-top: 8px;
        }

        .links a:hover {
            text-decoration: underline;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Alterar Palavra-Passe</h1>
            <p>Atualize a sua palavra-passe com seguranca</p>
        </div>

        <div class="info-box">
            A sua palavra-passe deve ter pelo menos 6 caracteres. Recomenda-se usar uma palavra-passe forte.
        </div>

        <form id="changePasswordForm">
            <div class="form-group">
                <label for="current_password">Palavra-Passe Atual:</label>
                <div class="toggle-password">
                    <input type="password" id="current_password" name="current_password" required>
                    <button type="button" class="toggle-btn" data-target="current_password">
                        <span>👁</span>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="new_password">Nova Palavra-Passe:</label>
                <div class="toggle-password">
                    <input type="password" id="new_password" name="new_password" required>
                    <button type="button" class="toggle-btn" data-target="new_password">
                        <span>👁</span>
                    </button>
                </div>
                <div class="password-strength" id="passwordStrength"></div>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirmar Nova Palavra-Passe:</label>
                <div class="toggle-password">
                    <input type="password" id="confirm_password" name="confirm_password" required>
                    <button type="button" class="toggle-btn" data-target="confirm_password">
                        <span>👁</span>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">Alterar Palavra-Passe</button>

            <div class="loading" id="loading">
                <div class="spinner"></div> Processando...
            </div>

            <div class="message" id="message"></div>
        </form>

        <div class="links">
            <a href="javascript:history.back()">Voltar</a>
            <a href="../index.php">Ir para o Dashboard</a>
        </div>
    </div>

    <script>
        function checkPasswordStrength(password) {
            let strength = 'weak';
            let message = 'Fraca';

            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[0-9]/.test(password) && /[!@#$%^&*]/.test(password)) {
                    strength = 'strong';
                    message = 'Muito Forte';
                } else if (/[A-Z]/.test(password) || /[0-9]/.test(password)) {
                    strength = 'strong';
                    message = 'Forte';
                } else {
                    strength = 'medium';
                    message = 'Media';
                }
            } else if (password.length >= 6) {
                strength = 'medium';
                message = 'Media';
            }

            return { strength, message };
        }

        document.querySelectorAll('.toggle-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.getElementById(btn.dataset.target);
                if (target.type === 'password') {
                    target.type = 'text';
                    btn.textContent = '🙈';
                } else {
                    target.type = 'password';
                    btn.textContent = '👁';
                }
            });
        });

        document.getElementById('new_password').addEventListener('input', (e) => {
            const strengthDiv = document.getElementById('passwordStrength');
            if (e.target.value.length >= 6) {
                const { strength, message } = checkPasswordStrength(e.target.value);
                strengthDiv.className = 'password-strength ' + strength;
                strengthDiv.textContent = 'Forca: ' + message;
            } else {
                strengthDiv.className = 'password-strength weak';
                strengthDiv.textContent = 'Minimo 6 caracteres';
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const current_password = document.getElementById('current_password').value;
            const new_password = document.getElementById('new_password').value;
            const confirm_password = document.getElementById('confirm_password').value;
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            const button = document.querySelector('.btn-submit');

            message.className = 'message';
            message.style.display = 'none';

            if (new_password.length < 6) {
                message.className = 'message error';
                message.textContent = 'A nova palavra-passe deve ter minimo 6 caracteres';
                message.style.display = 'block';
                return;
            }

            if (new_password !== confirm_password) {
                message.className = 'message error';
                message.textContent = 'As novas palavras-passe nao coincidem';
                message.style.display = 'block';
                return;
            }

            if (current_password === new_password) {
                message.className = 'message error';
                message.textContent = 'A nova palavra-passe nao pode ser igual a atual';
                message.style.display = 'block';
                return;
            }

            loading.style.display = 'block';
            button.disabled = true;

            try {
                const response = await fetch('change_password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `current_password=${encodeURIComponent(current_password)}&new_password=${encodeURIComponent(new_password)}`
                });

                const data = await response.json();

                loading.style.display = 'none';
                button.disabled = false;

                if (data.sucesso) {
                    message.className = 'message success';
                    message.textContent = data.mensagem;
                    document.getElementById('changePasswordForm').reset();
                    document.getElementById('passwordStrength').style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '../index.php';
                    }, 2000);
                } else {
                    message.className = 'message error';
                    message.textContent = data.erro || 'Erro ao alterar palavra-passe';
                }

                message.style.display = 'block';
            } catch (error) {
                loading.style.display = 'none';
                button.disabled = false;
                message.className = 'message error';
                message.textContent = 'Erro de conexao. Tente novamente.';
                message.style.display = 'block';
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('isLoggedIn') || sessionStorage.getItem('email');
            if (!isLoggedIn && !sessionStorage.getItem('email')) {
                window.location.href = '../index.php';
            }
        });
    </script>
</body>
</html>
