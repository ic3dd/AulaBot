<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trocar Palavra-Passe - AulaBot</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-trocar {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .trocar-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .trocar-header h1 {
            color: #333;
            font-size: 28px;
            margin: 0 0 10px 0;
        }
        
        .trocar-header p {
            color: #666;
            font-size: 14px;
            margin: 0;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .password-strength {
            margin-top: 8px;
            padding: 8px;
            border-radius: 3px;
            font-size: 12px;
            display: none;
        }
        
        .password-strength.weak {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .password-strength.medium {
            background-color: #fff3cd;
            color: #856404;
            display: block;
        }
        
        .password-strength.strong {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        
        .btn-trocar {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }
        
        .btn-trocar:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .btn-trocar:active:not(:disabled) {
            transform: translateY(0);
        }
        
        .btn-trocar:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-cancelar {
            width: 100%;
            padding: 12px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 8px;
        }
        
        .btn-cancelar:hover {
            transform: translateY(-2px);
            background: #5a6268;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container-trocar">
        <div class="trocar-header">
            <h1>Trocar Palavra-Passe</h1>
            <p>Atualize sua palavra-passe de forma segura</p>
        </div>
        
        <form id="trocarForm">
            <div class="form-group">
                <label for="password_atual">Palavra-Passe Atual:</label>
                <input type="password" id="password_atual" name="password_atual" required placeholder="Introduza a palavra-passe atual">
            </div>
            
            <div class="form-group">
                <label for="nova_password">Nova Palavra-Passe:</label>
                <input type="password" id="nova_password" name="nova_password" required placeholder="Minimo 6 caracteres">
                <div class="password-strength" id="passwordStrength"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmar_password">Confirmar Palavra-Passe:</label>
                <input type="password" id="confirmar_password" name="confirmar_password" required placeholder="Confirme a palavra-passe">
            </div>
            
            <button type="submit" class="btn-trocar">Trocar Palavra-Passe</button>
            <button type="button" class="btn-cancelar" onclick="window.history.back()">Cancelar</button>
            
            <div class="loading" id="loading">
                <div class="spinner"></div> Processando...
            </div>
            
            <div class="message" id="message"></div>
        </form>
    </div>
    
    <script>
        function checkPasswordStrength(password) {
            let strength = 'weak';
            let message = 'Fraca';
            
            if (password.length >= 8) {
                if (/[A-Z]/.test(password) && /[0-9]/.test(password)) {
                    strength = 'strong';
                    message = 'Forte';
                } else {
                    strength = 'medium';
                    message = 'Media';
                }
            } else if (password.length >= 6) {
                strength = 'medium';
                message = 'Media';
            }
            
            return { strength, message };
        }
        
        document.getElementById('nova_password').addEventListener('input', (e) => {
            const strengthDiv = document.getElementById('passwordStrength');
            if (e.target.value.length >= 6) {
                const { strength, message } = checkPasswordStrength(e.target.value);
                strengthDiv.className = 'password-strength ' + strength;
                strengthDiv.textContent = 'Forca: ' + message;
            } else {
                strengthDiv.className = 'password-strength weak';
                strengthDiv.textContent = 'Minimo 6 caracteres';
            }
        });
        
        document.getElementById('trocarForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password_atual = document.getElementById('password_atual').value;
            const nova_password = document.getElementById('nova_password').value;
            const confirmar_password = document.getElementById('confirmar_password').value;
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            const button = document.querySelector('.btn-trocar');
            
            if (nova_password.length < 6) {
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'A palavra-passe deve ter minimo 6 caracteres';
                message.style.display = 'block';
                return;
            }
            
            if (nova_password !== confirmar_password) {
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'As palavras-passe nao coincidem';
                message.style.display = 'block';
                return;
            }
            
            if (password_atual === nova_password) {
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'A nova palavra-passe deve ser diferente da atual';
                message.style.display = 'block';
                return;
            }
            
            loading.style.display = 'block';
            button.disabled = true;
            
            try {
                const response = await fetch('trocar_password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `password_atual=${encodeURIComponent(password_atual)}&nova_password=${encodeURIComponent(nova_password)}`
                });
                
                const data = await response.json();
                
                loading.style.display = 'none';
                button.disabled = false;
                
                message.classList.remove('error');
                
                if (data.sucesso) {
                    message.classList.add('success');
                    message.textContent = data.mensagem;
                    document.getElementById('trocarForm').reset();
                    document.getElementById('passwordStrength').className = 'password-strength';
                    setTimeout(() => {
                        window.location.href = '../index.php';
                    }, 2000);
                } else {
                    message.classList.add('error');
                    message.textContent = data.erro || 'Erro ao trocar palavra-passe';
                }
                
                message.style.display = 'block';
            } catch (error) {
                loading.style.display = 'none';
                button.disabled = false;
                message.classList.remove('success');
                message.classList.add('error');
                message.textContent = 'Erro de conexao. Tente novamente.';
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
